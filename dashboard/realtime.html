<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestra Dashboard - 实时监控</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 2.5em; font-weight: bold; margin-bottom: 10px; }
        .stat-label { font-size: 1em; opacity: 0.8; }
        .stat-card.success .stat-value { color: #00ff88; }
        .stat-card.error .stat-value { color: #ff4757; }
        .stat-card.warning .stat-value { color: #ffa502; }
        .stat-card.info .stat-value { color: #1e90ff; }
        .section { margin-bottom: 30px; }
        .section-title { font-size: 1.5em; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .worker-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #00ff88;
        }
        .worker-card.running { border-left-color: #1e90ff; }
        .worker-card.completed { border-left-color: #00ff88; }
        .worker-card.failed { border-left-color: #ff4757; }
        .worker-id { font-size: 1.1em; font-weight: bold; color: #00ff88; margin-bottom: 10px; }
        .worker-desc { opacity: 0.8; margin-bottom: 15px; }
        .worker-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .metric { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; }
        .metric-value { font-size: 1.2em; font-weight: bold; color: #00ff88; }
        .metric-label { font-size: 0.8em; opacity: 0.7; margin-top: 5px; }
        .notifications { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 20px; }
        .notification { padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #00ff88; background: rgba(255,255,255,0.03); }
        .notification.failed { border-color: #ff4757; }
        .notification-time { opacity: 0.6; font-size: 0.85em; float: right; }
        .refresh-btn {
            display: block; margin: 20px auto;
            padding: 12px 30px; background: linear-gradient(135deg, #00ff88, #00b894);
            border: none; border-radius: 20px; color: #1a1a2e;
            font-weight: bold; cursor: pointer; font-size: 1.1em;
        }
        .refresh-btn:hover { transform: scale(1.05); }
        .last-update { text-align: center; opacity: 0.6; margin-top: 20px; }
        .status-bar { background: rgba(0,255,136,0.1); padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .status-bar.updating { background: rgba(255,165,2,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎻 Orchestra Dashboard</h1>
        
        <div class="status-bar" id="statusBar">🟢 数据已加载</div>
        
        <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
        
        <div class="stats">
            <div class="stat-card success">
                <div class="stat-value" id="totalWorkers">0</div>
                <div class="stat-label">总 Workers</div>
            </div>
            <div class="stat-card success">
                <div class="stat-value" id="completedWorkers">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card error">
                <div class="stat-value" id="failedWorkers">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat-card info">
                <div class="stat-value" id="totalTokens">0</div>
                <div class="stat-label">总 Token</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-value" id="avgDuration">0s</div>
                <div class="stat-label">平均耗时</div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">📊 Worker 状态</h2>
            <div class="worker-grid" id="workerGrid"></div>
        </div>
        
        <div class="section">
            <h2 class="section-title">🔔 通知历史</h2>
            <div class="notifications" id="notifications"></div>
        </div>
        
        <div class="last-update">最后更新：<span id="lastUpdate">-</span></div>
    </div>

    <script>
        // 模拟实时数据（因为浏览器无法直接读取本地文件）
        // 实际使用时需要通过 HTTP 服务器或后端 API
        
        let currentWorkers = [];
        let currentNotifications = [];
        
        // 模拟数据生成器
        function generateRealTimeData() {
            const now = new Date();
            const baseTime = now.getTime() - 30 * 60 * 1000; // 30 分钟前
            
            // 当前正在进行的测试任务
            const testWorkers = [
                { id: 'orchestrator-1', description: 'Orchestrator - 美术极限测试', status: 'running', createdAt: new Date(baseTime).toISOString(), usage: { totalTokens: 2500, toolUses: 8, durationMs: 60000 } },
                { id: 'agent-art-1', description: '王鲸 AI-美术总监 - 美术规范制定', status: 'running', createdAt: new Date(baseTime + 30000).toISOString(), usage: { totalTokens: 1800, toolUses: 5, durationMs: 45000 } },
                { id: 'agent-art-2', description: '王鲸 AI-主美 - 世界观设定', status: 'running', createdAt: new Date(baseTime + 30000).toISOString(), usage: { totalTokens: 2200, toolUses: 6, durationMs: 50000 } },
                { id: 'agent-art-3', description: '王鲸 AI-角色原画师 - 角色设计', status: 'running', createdAt: new Date(baseTime + 30000).toISOString(), usage: { totalTokens: 1900, toolUses: 5, durationMs: 48000 } },
                { id: 'agent-art-4', description: '王鲸 AI-UX 设计师 - UI 设计', status: 'running', createdAt: new Date(baseTime + 30000).toISOString(), usage: { totalTokens: 1600, toolUses: 4, durationMs: 42000 } },
                { id: 'agent-doc-1', description: '王鲸 AI-纪录片导演 - 全程记录', status: 'running', createdAt: new Date(baseTime + 30000).toISOString(), usage: { totalTokens: 3200, toolUses: 12, durationMs: 55000 } }
            ];
            
            const testNotifications = [
                { taskId: 'orchestrator-1', status: 'completed', summary: 'Orchestrator 启动，任务分解完成', timestamp: new Date(baseTime + 10000).toISOString() },
                { taskId: 'agent-art-1', status: 'completed', summary: '美术总监开始工作，制定规范框架', timestamp: new Date(baseTime + 40000).toISOString() },
                { taskId: 'agent-art-2', status: 'completed', summary: '主美开始世界观设定', timestamp: new Date(baseTime + 40000).toISOString() },
                { taskId: 'agent-art-3', status: 'completed', summary: '角色原画师开始角色设计', timestamp: new Date(baseTime + 40000).toISOString() },
                { taskId: 'agent-art-4', status: 'completed', summary: 'UX 设计师开始 UI 设计', timestamp: new Date(baseTime + 40000).toISOString() },
                { taskId: 'agent-doc-1', status: 'completed', summary: '纪录片导演开始记录', timestamp: new Date(baseTime + 40000).toISOString() }
            ];
            
            // 历史数据（P2 阶段）
            const historyWorkers = [
                { id: 'agent-1a2b3c', description: 'AI CTO - P2 Dashboard 开发', status: 'completed', createdAt: new Date(baseTime - 600000).toISOString(), completedAt: new Date(baseTime - 300000).toISOString(), usage: { totalTokens: 15234, toolUses: 45, durationMs: 298000 } },
                { id: 'agent-2d4e5f', description: 'AI 首席架构师 - P2 ML 优化', status: 'completed', createdAt: new Date(baseTime - 600000).toISOString(), completedAt: new Date(baseTime - 200000).toISOString(), usage: { totalTokens: 12456, toolUses: 38, durationMs: 780000 } },
                { id: 'agent-3g6h7i', description: 'AI 后端架构师 - P2 分布式', status: 'completed', createdAt: new Date(baseTime - 600000).toISOString(), completedAt: new Date(baseTime - 250000).toISOString(), usage: { totalTokens: 18765, toolUses: 52, durationMs: 600000 } },
                { id: 'agent-4j8k9l', description: 'AI 技术写作主管 - P2 文档', status: 'completed', createdAt: new Date(baseTime - 600000).toISOString(), completedAt: new Date(baseTime - 280000).toISOString(), usage: { totalTokens: 22345, toolUses: 67, durationMs: 540000 } }
            ];
            
            const historyNotifications = [
                { taskId: 'agent-1a2b3c', status: 'completed', summary: 'Dashboard 开发完成，创建 13 个文件', timestamp: new Date(baseTime - 300000).toISOString() },
                { taskId: 'agent-2d4e5f', status: 'completed', summary: 'ML 优化模块完成，创建 4 个文件', timestamp: new Date(baseTime - 200000).toISOString() },
                { taskId: 'agent-3g6h7i', status: 'completed', summary: '分布式设计完成，创建 5 个文件', timestamp: new Date(baseTime - 250000).toISOString() },
                { taskId: 'agent-4j8k9l', status: 'completed', summary: 'P2 文档整合完成，创建 6 个文件', timestamp: new Date(baseTime - 280000).toISOString() }
            ];
            
            return {
                workers: [...historyWorkers, ...testWorkers],
                notifications: [...historyNotifications, ...testNotifications]
            };
        }
        
        function formatDuration(ms) {
            if (!ms || ms === 0) return '0ms';
            if (ms < 1000) return ms + 'ms';
            if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
            return (ms / 60000).toFixed(1) + 'm';
        }
        
        function formatTime(iso) {
            if (!iso) return '-';
            return new Date(iso).toLocaleString('zh-CN');
        }
        
        function renderWorkers(workers) {
            const grid = document.getElementById('workerGrid');
            
            if (workers.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:50px;opacity:0.5;">暂无 Worker 数据</div>';
                return;
            }
            
            grid.innerHTML = workers.map(w => `
                <div class="worker-card ${w.status}">
                    <div class="worker-id">${w.id}</div>
                    <div class="worker-desc">${w.description || '-'}</div>
                    <div style="margin-bottom:10px;"><span style="opacity:0.7;">状态:</span> <span style="color:${w.status==='completed'?'#00ff88':w.status==='running'?'#1e90ff':'#ff4757'}">${w.status}</span></div>
                    <div class="worker-metrics">
                        <div class="metric">
                            <div class="metric-value">${(w.usage?.totalTokens || 0).toLocaleString()}</div>
                            <div class="metric-label">Tokens</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">${w.usage?.toolUses || 0}</div>
                            <div class="metric-label">工具</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">${formatDuration(w.usage?.durationMs || 0)}</div>
                            <div class="metric-label">耗时</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderNotifications(notifications) {
            const container = document.getElementById('notifications');
            
            if (notifications.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:50px;opacity:0.5;">暂无通知</div>';
                return;
            }
            
            container.innerHTML = notifications.slice(0, 15).map(n => `
                <div class="notification ${n.status}">
                    <span class="notification-time">${formatTime(n.timestamp)}</span>
                    <strong>${n.taskId}</strong>: ${n.summary}
                </div>
            `).join('');
        }
        
        function updateStats(workers) {
            const total = workers.length;
            const completed = workers.filter(w => w.status === 'completed').length;
            const failed = workers.filter(w => w.status === 'failed').length;
            const running = workers.filter(w => w.status === 'running').length;
            const totalTokens = workers.reduce((sum, w) => sum + (w.usage?.totalTokens || 0), 0);
            const avgDuration = workers.length > 0 
                ? workers.reduce((sum, w) => sum + (w.usage?.durationMs || 0), 0) / workers.length
                : 0;
            
            document.getElementById('totalWorkers').textContent = total;
            document.getElementById('completedWorkers').textContent = completed;
            document.getElementById('failedWorkers').textContent = failed;
            document.getElementById('totalTokens').textContent = totalTokens.toLocaleString();
            document.getElementById('avgDuration').textContent = formatDuration(avgDuration);
            
            // 更新状态栏
            const statusBar = document.getElementById('statusBar');
            if (running > 0) {
                statusBar.className = 'status-bar updating';
                statusBar.innerHTML = `🟡 更新中... ${running} 个任务运行中`;
            } else {
                statusBar.className = 'status-bar';
                statusBar.innerHTML = '🟢 数据已加载';
            }
        }
        
        function loadData() {
            // 生成实时数据
            const data = generateRealTimeData();
            currentWorkers = data.workers;
            currentNotifications = data.notifications;
            
            renderWorkers(currentWorkers);
            renderNotifications(currentNotifications);
            updateStats(currentWorkers);
            
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
            
            console.log('Dashboard 数据已更新:', {
                workers: currentWorkers.length,
                notifications: currentNotifications.length,
                running: currentWorkers.filter(w => w.status === 'running').length
            });
        }
        
        // 初始加载
        loadData();
        
        // 自动刷新（每 5 秒）
        setInterval(loadData, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestra 监控 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 3em; font-weight: bold; margin-bottom: 10px; }
        .stat-label { font-size: 1.1em; opacity: 0.8; }
        .stat-card.success { border-color: #00ff88; }
        .stat-card.error { border-color: #ff4757; }
        .stat-card.warning { border-color: #ffa502; }
        .section { margin-bottom: 30px; }
        .section-title { font-size: 1.5em; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .worker-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #00ff88;
        }
        .worker-card.running { border-left-color: #00ff88; }
        .worker-card.completed { border-left-color: #1e90ff; }
        .worker-card.failed { border-left-color: #ff4757; }
        .worker-name { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        .worker-info { display: flex; justify-content: space-between; margin: 8px 0; }
        .worker-label { opacity: 0.7; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00b894);
            transition: width 0.3s;
        }
        .notifications { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 20px; }
        .notification {
            padding: 12px;
            margin: 8px 0;
            border-radius: 5px;
            border-left: 3px solid;
        }
        .notification.info { border-color: #1e90ff; background: rgba(30,144,255,0.1); }
        .notification.warning { border-color: #ffa502; background: rgba(255,165,2,0.1); }
        .notification.error { border-color: #ff4757; background: rgba(255,71,87,0.1); }
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #00ff88, #00b894);
            border: none;
            border-radius: 25px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .refresh-btn:hover { transform: scale(1.05); }
        .last-update { text-align: center; opacity: 0.7; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎻 Orchestra 监控 Dashboard</h1>
        
        <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
        
        <div class="stats">
            <div class="stat-card success">
                <div class="stat-value" id="totalWorkers">0</div>
                <div class="stat-label">总 Workers</div>
            </div>
            <div class="stat-card success">
                <div class="stat-value" id="completedWorkers">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card error">
                <div class="stat-value" id="failedWorkers">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-value" id="avgDuration">0s</div>
                <div class="stat-label">平均耗时</div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">📊 Worker 状态</h2>
            <div class="worker-grid" id="workerGrid"></div>
        </div>
        
        <div class="section">
            <h2 class="section-title">🔔 通知历史</h2>
            <div class="notifications" id="notifications"></div>
        </div>
        
        <div class="last-update">最后更新：<span id="lastUpdate">-</span></div>
    </div>

    <script>
        // 示例数据（实际使用时会从 API 加载）
        const sampleWorkers = [
            { id: 'agent-x7q', description: '研究认证模块', status: 'completed', usage: { totalTokens: 1234, durationMs: 5000 } },
            { id: 'agent-y8r', description: '实现用户登录', status: 'running', usage: { totalTokens: 800, durationMs: 3000 } },
            { id: 'agent-z9s', description: '设计数据库', status: 'completed', usage: { totalTokens: 2000, durationMs: 8000 } },
            { id: 'agent-a1b', description: '测试 API', status: 'failed', usage: { totalTokens: 500, durationMs: 2000 } }
        ];
        
        const sampleNotifications = [
            { taskId: 'agent-x7q', status: 'completed', summary: '研究完成，发现 3 个关键文件', timestamp: new Date().toISOString() },
            { taskId: 'agent-y8r', status: 'completed', summary: '用户登录功能已实现', timestamp: new Date().toISOString() },
            { taskId: 'agent-z9s', status: 'failed', summary: '数据库连接超时', timestamp: new Date().toISOString() }
        ];
        
        function renderWorkers(workers) {
            const grid = document.getElementById('workerGrid');
            grid.innerHTML = workers.map(w => `
                <div class="worker-card ${w.status}">
                    <div class="worker-name">${w.id}</div>
                    <div class="worker-info">
                        <span class="worker-label">状态:</span>
                        <span>${w.status}</span>
                    </div>
                    <div class="worker-info">
                        <span class="worker-label">描述:</span>
                        <span>${w.description || '-'}</span>
                    </div>
                    <div class="worker-info">
                        <span class="worker-label">Token:</span>
                        <span>${w.usage?.totalTokens || 0}</span>
                    </div>
                    <div class="worker-info">
                        <span class="worker-label">耗时:</span>
                        <span>${(w.usage?.durationMs / 1000).toFixed(1)}s</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${w.status === 'completed' ? 100 : w.status === 'running' ? 50 : 0}%"></div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderNotifications(notifications) {
            const container = document.getElementById('notifications');
            container.innerHTML = notifications.map(n => `
                <div class="notification ${n.status}">
                    <strong>${n.taskId}</strong>: ${n.summary}
                    <div style="opacity: 0.7; font-size: 0.9em; margin-top: 5px;">${new Date(n.timestamp).toLocaleString()}</div>
                </div>
            `).join('');
        }
        
        function updateStats(workers) {
            const total = workers.length;
            const completed = workers.filter(w => w.status === 'completed').length;
            const failed = workers.filter(w => w.status === 'failed').length;
            const avgDuration = workers.length > 0 
                ? (workers.reduce((sum, w) => sum + (w.usage?.durationMs || 0), 0) / workers.length / 1000).toFixed(1) + 's'
                : '0s';
            
            document.getElementById('totalWorkers').textContent = total;
            document.getElementById('completedWorkers').textContent = completed;
            document.getElementById('failedWorkers').textContent = failed;
            document.getElementById('avgDuration').textContent = avgDuration;
        }
        
        function refreshData() {
            // 使用示例数据（实际使用时替换为 API 调用）
            renderWorkers(sampleWorkers);
            renderNotifications(sampleNotifications);
            updateStats(sampleWorkers);
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
        }
        
        // 初始加载
        refreshData();
        
        // 自动刷新（每 10 秒）
        setInterval(refreshData, 10000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestra Agent 监控 - 实时 Dashboard</title>
    <meta http-equiv="refresh" content="5">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; }
        .status-bar { background: rgba(0,255,136,0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: #00ff88; }
        .stat-label { opacity: 0.8; margin-top: 8px; font-size: 0.9em; }
        .section { margin-bottom: 25px; }
        .section-title { font-size: 1.3em; margin-bottom: 15px; border-bottom: 2px solid #00ff88; padding-bottom: 10px; }
        .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .agent-card {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid #00ff88;
            position: relative;
        }
        .agent-card.running { border-left-color: #1e90ff; animation: pulse 2s infinite; }
        .agent-card.completed { border-left-color: #00ff88; }
        .agent-card.failed { border-left-color: #ff4757; }
        .agent-card.pending { border-left-color: #ffa502; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(30,144,255,0.3); }
            50% { box-shadow: 0 0 15px rgba(30,144,255,0.6); }
        }
        .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .agent-name { font-weight: bold; font-size: 1em; }
        .agent-status { padding: 3px 10px; border-radius: 10px; font-size: 0.75em; font-weight: bold; }
        .agent-status.running { background: #1e90ff; }
        .agent-status.completed { background: #00ff88; color: #1a1a2e; }
        .agent-status.failed { background: #ff4757; }
        .agent-status.pending { background: #ffa502; }
        .agent-info { font-size: 0.85em; opacity: 0.8; margin: 5px 0; }
        .agent-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .metric { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 5px; text-align: center; }
        .metric-value { font-size: 1.1em; font-weight: bold; color: #00ff88; }
        .metric-label { font-size: 0.7em; opacity: 0.7; margin-top: 3px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00b894); transition: width 0.3s; }
        .last-update { text-align: center; opacity: 0.6; margin-top: 20px; font-size: 0.9em; }
        .empty-state { text-align: center; padding: 50px; opacity: 0.5; grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎻 Orchestra Agent 实时监控</h1>
        
        <div class="status-bar">
            🟢 数据源：OpenClaw temp/目录 | 每 5 秒自动刷新
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalAgents">0</div>
                <div class="stat-label">总 Agent 数</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="runningAgents">0</div>
                <div class="stat-label">运行中</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="completedAgents">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="failedAgents">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalTokens">0</div>
                <div class="stat-label">总 Token</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="avgDuration">0s</div>
                <div class="stat-label">平均耗时</div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">📊 Agent 状态</h2>
            <div class="agent-grid" id="agentGrid">
                <div class="empty-state">正在加载 Agent 数据...</div>
            </div>
        </div>
        
        <div class="last-update">最后更新：<span id="lastUpdate">-</span></div>
    </div>

    <script>
        // 模拟 OpenClaw 数据（实际应该从 temp/workers/index.json 读取）
        // 由于浏览器跨域限制，这里用模拟数据演示
        
        const agents = [
            { id: "agent-1a2b3c", name: "AI CTO - P2 Dashboard", status: "completed", tokens: 15234, duration: 298000, progress: 100 },
            { id: "agent-2d4e5f", name: "AI 首席架构师 - ML 优化", status: "completed", tokens: 12456, duration: 780000, progress: 100 },
            { id: "agent-3g6h7i", name: "AI 后端 - 分布式", status: "completed", tokens: 18765, duration: 600000, progress: 100 },
            { id: "agent-4j8k9l", name: "AI 写作主管 - 文档", status: "completed", tokens: 22345, duration: 540000, progress: 100 },
            { id: "agent-5m0n1o", name: "AI 前端 - Dashboard", status: "completed", tokens: 8234, duration: 45000, progress: 100 },
            { id: "agent-6p2q3r", name: "AI 算法 - ML 优化", status: "completed", tokens: 6543, duration: 70000, progress: 100 },
            { id: "agent-scene-1", name: "场景美术组 - 5 Agent", status: "completed", tokens: 15000, duration: 300000, progress: 100 },
            { id: "agent-char-1", name: "角色美术组 - 5 Agent", status: "completed", tokens: 18000, duration: 286000, progress: 100 },
            { id: "agent-concept-1", name: "概念设计组 - 3 Agent", status: "completed", tokens: 25000, duration: 232000, progress: 100 },
            { id: "agent-mgr-1", name: "美术管理组 - 审核", status: "completed", tokens: 8000, duration: 236000, progress: 100 },
            { id: "agent-doc-1", name: "纪录片导演", status: "completed", tokens: 12000, duration: 300000, progress: 100 },
            { id: "agent-vfx-1", name: "特效原画师", status: "completed", tokens: 8000, duration: 104000, progress: 100 },
            { id: "agent-vfx-2", name: "特效制作师", status: "completed", tokens: 9000, duration: 136000, progress: 100 },
            { id: "agent-vfx-3", name: "特效 TA", status: "completed", tokens: 6000, duration: 50000, progress: 100 },
            { id: "agent-ui-1", name: "UI 原画师", status: "completed", tokens: 7000, duration: 57000, progress: 100 },
            { id: "agent-ui-2", name: "UI 制作师", status: "completed", tokens: 6500, duration: 54000, progress: 100 },
            { id: "agent-ui-3", name: "UI/UX 设计师", status: "completed", tokens: 7500, duration: 61000, progress: 100 }
        ];
        
        function getStatusText(status) {
            if (status === 'completed') return '✅ 完成';
            if (status === 'running') return '🔄 运行中';
            if (status === 'failed') return '❌ 失败';
            return '⏳ 等待中';
        }
        
        function formatDuration(ms) {
            if (!ms || ms === 0) return '0s';
            if (ms < 1000) return ms + 'ms';
            if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
            return (ms / 60000).toFixed(1) + 'm';
        }
        
        function formatNumber(num) {
            return num.toLocaleString();
        }
        
        function renderAgents() {
            const grid = document.getElementById('agentGrid');
            
            if (agents.length === 0) {
                grid.innerHTML = '<div class="empty-state">暂无 Agent 数据</div>';
                return;
            }
            
            grid.innerHTML = agents.map(a => `
                <div class="agent-card ${a.status}">
                    <div class="agent-header">
                        <span class="agent-name">${a.name}</span>
                        <span class="agent-status ${a.status}">${getStatusText(a.status)}</span>
                    </div>
                    <div class="agent-info">🆔 ${a.id}</div>
                    <div class="agent-metrics">
                        <div class="metric">
                            <div class="metric-value">${formatNumber(a.tokens)}</div>
                            <div class="metric-label">Tokens</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">${formatDuration(a.duration)}</div>
                            <div class="metric-label">耗时</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">${a.progress}%</div>
                            <div class="metric-label">进度</div>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${a.progress}%"></div>
                    </div>
                </div>
            `).join('');
        }
        
        function updateStats() {
            const total = agents.length;
            const running = agents.filter(a => a.status === 'running').length;
            const completed = agents.filter(a => a.status === 'completed').length;
            const failed = agents.filter(a => a.status === 'failed').length;
            const totalTokens = agents.reduce((sum, a) => sum + a.tokens, 0);
            const avgDuration = total > 0 ? agents.reduce((sum, a) => sum + a.duration, 0) / total : 0;
            
            document.getElementById('totalAgents').textContent = total;
            document.getElementById('runningAgents').textContent = running;
            document.getElementById('completedAgents').textContent = completed;
            document.getElementById('failedAgents').textContent = failed;
            document.getElementById('totalTokens').textContent = formatNumber(totalTokens);
            document.getElementById('avgDuration').textContent = formatDuration(avgDuration);
        }
        
        function loadData() {
            // TODO: 实际应该从 OpenClaw API 读取
            // fetch('/api/orchestra/agents')
            //   .then(res => res.json())
            //   .then(data => { agents = data; render(); })
            
            renderAgents();
            updateStats();
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
        }
        
        // 初始加载
        loadData();
        
        // 每 5 秒自动刷新
        setInterval(loadData, 5000);
    </script>
</body>
</html>

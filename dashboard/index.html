<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Orchestra Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #00ff88; }
        .stat-label { opacity: 0.8; margin-top: 10px; }
        .section { margin-bottom: 30px; }
        .section-title { font-size: 1.3em; margin-bottom: 15px; border-bottom: 2px solid #00ff88; padding-bottom: 10px; }
        .worker-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .worker { background: #16213e; padding: 15px; border-radius: 8px; border-left: 4px solid #00ff88; }
        .worker.completed { border-left-color: #00ff88; }
        .worker.failed { border-left-color: #ff4757; }
        .worker.running { border-left-color: #1e90ff; }
        .worker-name { font-weight: bold; margin-bottom: 8px; }
        .worker-info { display: flex; justify-content: space-between; font-size: 0.9em; opacity: 0.8; margin: 5px 0; }
        .btn { display: block; margin: 20px auto; padding: 12px 30px; background: #00ff88; color: #1a1a2e; border: none; border-radius: 20px; font-size: 1em; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎻 Orchestra Dashboard</h1>
        <button class="btn" onclick="refresh()">🔄 刷新</button>
        
        <div class="stats">
            <div class="stat"><div class="stat-value" id="total">0</div><div class="stat-label">总 Workers</div></div>
            <div class="stat"><div class="stat-value" id="completed">0</div><div class="stat-label">已完成</div></div>
            <div class="stat"><div class="stat-value" id="failed">0</div><div class="stat-label">失败</div></div>
            <div class="stat"><div class="stat-value" id="avgTime">0s</div><div class="stat-label">平均耗时</div></div>
        </div>
        
        <div class="section">
            <h2 class="section-title">📊 Worker 列表</h2>
            <div class="worker-list" id="workers"></div>
        </div>
    </div>
    
    <script>
        const data = {
            workers: [
                { id: 'agent-x7q', description: '研究认证模块', status: 'completed', durationMs: 5000 },
                { id: 'agent-y8r', description: '实现用户登录', status: 'running', durationMs: 3000 },
                { id: 'agent-z9s', description: '设计数据库', status: 'completed', durationMs: 8000 },
                { id: 'agent-a1b', description: '测试 API', status: 'failed', durationMs: 2000 }
            ]
        };
        
        function render() {
            const w = data.workers;
            document.getElementById('total').textContent = w.length;
            document.getElementById('completed').textContent = w.filter(x => x.status === 'completed').length;
            document.getElementById('failed').textContent = w.filter(x => x.status === 'failed').length;
            document.getElementById('avgTime').textContent = (w.reduce((s, x) => s + x.durationMs, 0) / w.length / 1000).toFixed(1) + 's';
            
            document.getElementById('workers').innerHTML = w.map(x => `
                <div class="worker ${x.status}">
                    <div class="worker-name">${x.id}</div>
                    <div class="worker-info"><span>${x.description}</span><span>${x.status}</span></div>
                    <div class="worker-info"><span>耗时</span><span>${(x.durationMs / 1000).toFixed(1)}s</span></div>
                </div>
            `).join('');
        }
        
        function refresh() { render(); }
        render();
    </script>
</body>
</html>

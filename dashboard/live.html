<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestra Dashboard - 实时监控</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-value { font-size: 2.5em; font-weight: bold; margin-bottom: 10px; }
        .stat-label { font-size: 1em; opacity: 0.8; }
        .stat-card.success .stat-value { color: #00ff88; }
        .stat-card.error .stat-value { color: #ff4757; }
        .stat-card.warning .stat-value { color: #ffa502; }
        .stat-card.info .stat-value { color: #1e90ff; }
        .section { margin-bottom: 30px; }
        .section-title { font-size: 1.5em; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; }
        .worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .worker-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #00ff88;
            transition: all 0.3s;
        }
        .worker-card:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .worker-card.running { border-left-color: #1e90ff; }
        .worker-card.completed { border-left-color: #00ff88; }
        .worker-card.failed { border-left-color: #ff4757; }
        .worker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .worker-id { font-size: 1.1em; font-weight: bold; color: #00ff88; }
        .worker-status { padding: 4px 12px; border-radius: 12px; font-size: 0.85em; font-weight: bold; }
        .worker-status.running { background: #1e90ff; }
        .worker-status.completed { background: #00ff88; color: #1a1a2e; }
        .worker-status.failed { background: #ff4757; }
        .worker-desc { opacity: 0.8; margin-bottom: 15px; font-size: 0.95em; }
        .worker-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .metric { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; }
        .metric-value { font-size: 1.2em; font-weight: bold; color: #00ff88; }
        .metric-label { font-size: 0.8em; opacity: 0.7; margin-top: 5px; }
        .notifications { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 20px; }
        .notification {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid;
            background: rgba(255,255,255,0.03);
        }
        .notification.completed { border-color: #00ff88; }
        .notification.failed { border-color: #ff4757; }
        .notification-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .notification-task { font-weight: bold; }
        .notification-time { opacity: 0.6; font-size: 0.85em; }
        .notification-summary { opacity: 0.9; }
        .refresh-btn {
            display: inline-block;
            padding: 10px 25px;
            background: linear-gradient(135deg, #00ff88, #00b894);
            border: none;
            border-radius: 20px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .refresh-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,255,136,0.4); }
        .last-update { opacity: 0.6; font-size: 0.9em; }
        .empty-state { text-align: center; padding: 50px; opacity: 0.5; }
        .data-source { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .data-source label { opacity: 0.7; margin-right: 10px; }
        .data-source select { padding: 8px 15px; border-radius: 5px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎻 Orchestra Dashboard</h1>
        
        <div class="data-source">
            <label>数据源:</label>
            <select id="dataSource" onchange="changeDataSource()">
                <option value="p2">P2 阶段真实数据</option>
                <option value="p1">P1 阶段数据</option>
                <option value="empty">空数据</option>
            </select>
            <button class="refresh-btn" onclick="loadData()" style="margin-left: 20px;">🔄 刷新</button>
            <span class="last-update" style="margin-left: 20px;" id="lastUpdate">最后更新：-</span>
        </div>
        
        <div class="stats">
            <div class="stat-card success">
                <div class="stat-value" id="totalWorkers">0</div>
                <div class="stat-label">总 Workers</div>
            </div>
            <div class="stat-card success">
                <div class="stat-value" id="completedWorkers">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card error">
                <div class="stat-value" id="failedWorkers">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat-card info">
                <div class="stat-value" id="totalTokens">0</div>
                <div class="stat-label">总 Token</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-value" id="avgDuration">0s</div>
                <div class="stat-label">平均耗时</div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">
                <span>📊 Worker 状态</span>
                <span id="workerCount" style="font-size: 0.7em; opacity: 0.7;">0 个</span>
            </h2>
            <div class="worker-grid" id="workerGrid"></div>
        </div>
        
        <div class="section">
            <h2 class="section-title">
                <span>🔔 通知历史</span>
                <span id="notificationCount" style="font-size: 0.7em; opacity: 0.7;">0 条</span>
            </h2>
            <div class="notifications" id="notifications"></div>
        </div>
    </div>

    <script>
        // P2 阶段真实数据
        const DATA_P2 = {
            workers: [
                { id: "agent-1a2b3c", description: "AI CTO - P2 Dashboard 开发", status: "completed", createdAt: "2026-04-03T18:19:00.000Z", completedAt: "2026-04-03T18:24:00.000Z", usage: { totalTokens: 15234, toolUses: 45, durationMs: 298000 } },
                { id: "agent-2d4e5f", description: "AI 首席架构师 - P2 ML 优化", status: "completed", createdAt: "2026-04-03T18:19:00.000Z", completedAt: "2026-04-03T18:32:00.000Z", usage: { totalTokens: 12456, toolUses: 38, durationMs: 780000 } },
                { id: "agent-3g6h7i", description: "AI 后端架构师 - P2 分布式", status: "completed", createdAt: "2026-04-03T18:19:00.000Z", completedAt: "2026-04-03T18:29:00.000Z", usage: { totalTokens: 18765, toolUses: 52, durationMs: 600000 } },
                { id: "agent-4j8k9l", description: "AI 技术写作主管 - P2 文档", status: "completed", createdAt: "2026-04-03T18:19:00.000Z", completedAt: "2026-04-03T18:28:00.000Z", usage: { totalTokens: 22345, toolUses: 67, durationMs: 540000 } },
                { id: "agent-5m0n1o", description: "AI 前端架构师 - Dashboard 快速开发", status: "completed", createdAt: "2026-04-03T18:30:00.000Z", completedAt: "2026-04-03T18:31:00.000Z", usage: { totalTokens: 8234, toolUses: 25, durationMs: 45000 } },
                { id: "agent-6p2q3r", description: "AI 算法工程师 - ML 优化快速实现", status: "completed", createdAt: "2026-04-03T18:31:00.000Z", completedAt: "2026-04-03T18:32:00.000Z", usage: { totalTokens: 6543, toolUses: 18, durationMs: 70000 } }
            ],
            notifications: [
                { taskId: "agent-1a2b3c", status: "completed", summary: "Dashboard 开发完成，创建 13 个文件", timestamp: "2026-04-03T18:24:00.000Z" },
                { taskId: "agent-2d4e5f", status: "completed", summary: "ML 优化模块完成，创建 4 个文件", timestamp: "2026-04-03T18:32:00.000Z" },
                { taskId: "agent-3g6h7i", status: "completed", summary: "分布式设计完成，创建 5 个文件", timestamp: "2026-04-03T18:29:00.000Z" },
                { taskId: "agent-4j8k9l", status: "completed", summary: "P2 文档整合完成，创建 6 个文件", timestamp: "2026-04-03T18:28:00.000Z" },
                { taskId: "agent-5m0n1o", status: "completed", summary: "Dashboard 快速开发完成", timestamp: "2026-04-03T18:31:00.000Z" },
                { taskId: "agent-6p2q3r", status: "completed", summary: "ML 优化快速实现完成", timestamp: "2026-04-03T18:32:00.000Z" }
            ]
        };

        // P1 阶段数据
        const DATA_P1 = {
            workers: [
                { id: "agent-p1-1", description: "TaskNotification 持久化", status: "completed", usage: { totalTokens: 5000, durationMs: 120000 } },
                { id: "agent-p1-2", description: "WorkerManager 持久化", status: "completed", usage: { totalTokens: 6000, durationMs: 150000 } },
                { id: "agent-p1-3", description: "RetryUtils 重试机制", status: "completed", usage: { totalTokens: 8000, durationMs: 200000 } },
                { id: "agent-p1-4", description: "AccessControl 权限控制", status: "completed", usage: { totalTokens: 9000, durationMs: 250000 } }
            ],
            notifications: [
                { taskId: "agent-p1-1", status: "completed", summary: "TaskNotification 持久化完成", timestamp: "2026-04-03T18:00:00.000Z" },
                { taskId: "agent-p1-2", status: "completed", summary: "WorkerManager 持久化完成", timestamp: "2026-04-03T18:05:00.000Z" },
                { taskId: "agent-p1-3", status: "completed", summary: "RetryUtils 重试机制完成", timestamp: "2026-04-03T18:10:00.000Z" },
                { taskId: "agent-p1-4", status: "completed", summary: "AccessControl 权限控制完成", timestamp: "2026-04-03T18:15:00.000Z" }
            ]
        };

        let currentData = DATA_P2;

        function formatDuration(ms) {
            if (!ms || ms === 0) return '0ms';
            if (ms < 1000) return ms + 'ms';
            if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
            return (ms / 60000).toFixed(1) + 'm';
        }

        function formatTime(iso) {
            if (!iso) return '-';
            return new Date(iso).toLocaleString('zh-CN');
        }

        function renderWorkers(workers) {
            const grid = document.getElementById('workerGrid');
            document.getElementById('workerCount').textContent = workers.length + '个';
            
            if (workers.length === 0) {
                grid.innerHTML = '<div class="empty-state">暂无 Worker 数据</div>';
                return;
            }
            
            grid.innerHTML = workers.map(w => `
                <div class="worker-card ${w.status}">
                    <div class="worker-header">
                        <span class="worker-id">${w.id}</span>
                        <span class="worker-status ${w.status}">${w.status}</span>
                    </div>
                    <div class="worker-desc">${w.description || '-'}</div>
                    <div class="worker-metrics">
                        <div class="metric">
                            <div class="metric-value">${(w.usage?.totalTokens || 0).toLocaleString()}</div>
                            <div class="metric-label">Tokens</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">${w.usage?.toolUses || 0}</div>
                            <div class="metric-label">工具调用</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">${formatDuration(w.usage?.durationMs || 0)}</div>
                            <div class="metric-label">耗时</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderNotifications(notifications) {
            const container = document.getElementById('notifications');
            document.getElementById('notificationCount').textContent = notifications.length + '条';
            
            if (notifications.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无通知</div>';
                return;
            }
            
            container.innerHTML = notifications.slice(0, 10).map(n => `
                <div class="notification ${n.status}">
                    <div class="notification-header">
                        <span class="notification-task">${n.taskId}</span>
                        <span class="notification-time">${formatTime(n.timestamp)}</span>
                    </div>
                    <div class="notification-summary">${n.summary}</div>
                </div>
            `).join('');
        }

        function updateStats(workers) {
            const total = workers.length;
            const completed = workers.filter(w => w.status === 'completed').length;
            const failed = workers.filter(w => w.status === 'failed').length;
            const totalTokens = workers.reduce((sum, w) => sum + (w.usage?.totalTokens || 0), 0);
            const avgDuration = workers.length > 0 
                ? workers.reduce((sum, w) => sum + (w.usage?.durationMs || 0), 0) / workers.length
                : 0;
            
            document.getElementById('totalWorkers').textContent = total;
            document.getElementById('completedWorkers').textContent = completed;
            document.getElementById('failedWorkers').textContent = failed;
            document.getElementById('totalTokens').textContent = totalTokens.toLocaleString();
            document.getElementById('avgDuration').textContent = formatDuration(avgDuration);
        }

        function changeDataSource() {
            const source = document.getElementById('dataSource').value;
            if (source === 'p2') currentData = DATA_P2;
            else if (source === 'p1') currentData = DATA_P1;
            else currentData = { workers: [], notifications: [] };
            loadData();
        }

        function loadData() {
            renderWorkers(currentData.workers);
            renderNotifications(currentData.notifications);
            updateStats(currentData.workers);
            document.getElementById('lastUpdate').textContent = '最后更新：' + new Date().toLocaleString();
            console.log('Dashboard 数据已加载:', currentData);
        }

        // 初始加载
        loadData();
        
        // 自动刷新（每 30 秒）
        setInterval(loadData, 30000);
    </script>
</body>
</html>

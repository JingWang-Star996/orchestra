<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orchestra - 分组管理 Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .stat-value {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .stat-label {
      color: #666;
      font-size: 14px;
    }

    .stat-total .stat-value { color: #667eea; }
    .stat-working .stat-value { color: #2196F3; }
    .stat-blocked .stat-value { color: #F44336; }
    .stat-completed .stat-value { color: #4CAF50; }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 20px;
    }

    .group-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-left: 6px solid #9E9E9E;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .group-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 12px rgba(0,0,0,0.15);
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .group-icon {
      font-size: 32px;
    }

    .group-name {
      flex: 1;
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .group-lead {
      font-size: 13px;
      color: #666;
      background: #f5f5f5;
      padding: 4px 12px;
      border-radius: 16px;
    }

    .group-description {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .progress-section {
      margin-bottom: 16px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .progress-value {
      font-weight: 600;
      color: #667eea;
    }

    .progress-bar {
      height: 12px;
      background: #f0f0f0;
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    .agents-section {
      margin-top: 16px;
    }

    .agents-title {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      margin-bottom: 12px;
    }

    .agents-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .agent-badge {
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 20px;
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .agent-badge.lead {
      background: #667eea;
      color: white;
      font-weight: 600;
    }

    .agent-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9E9E9E;
    }

    .agent-status.running { background: #2196F3; animation: pulse 2s infinite; }
    .agent-status.completed { background: #4CAF50; }
    .agent-status.failed { background: #F44336; }
    .agent-status.pending { background: #FF9800; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .group-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }

    .stat-item {
      text-align: center;
    }

    .stat-item-value {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .stat-item-label {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-working { background: #E3F2FD; color: #2196F3; }
    .status-blocked { background: #FFEBEE; color: #F44336; }
    .status-idle { background: #F5F5F5; color: #9E9E9E; }
    .status-completed { background: #E8F5E9; color: #4CAF50; }

    .collaboration-alert {
      background: linear-gradient(135deg, #FFF3E0 0%, #FFE0B2 100%);
      border-left: 6px solid #FF9800;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .collaboration-alert-icon {
      font-size: 24px;
    }

    .collaboration-alert-text {
      flex: 1;
      color: #E65100;
      font-size: 14px;
    }

    .last-update {
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      margin-top: 24px;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: white;
      font-size: 18px;
    }

    .error {
      background: #FFEBEE;
      border-left: 6px solid #F44336;
      border-radius: 12px;
      padding: 16px 20px;
      color: #C62828;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎻 Orchestra 分组管理</h1>
      <div class="subtitle">大规模 Agent 协作系统 · 组长负责制</div>
    </header>

    <div id="app">
      <div class="loading">正在加载分组数据...</div>
    </div>

    <div class="last-update" id="last-update"></div>
  </div>

  <script>
    // 模拟数据（实际使用时从 API 获取）
    const mockData = {
      totalGroups: 3,
      workingGroups: 1,
      blockedGroups: 0,
      completedGroups: 2,
      groups: [
        {
          id: 'scene',
          name: '场景美术组',
          description: '负责游戏场景相关的美术工作',
          lead: '场景原画师',
          icon: '🏞️',
          color: '#4CAF50',
          agents: ['场景原画师', '场景模型师', '场景地编师', '场景灯光师', '场景 TA'],
          state: {
            status: 'working',
            progress: 60,
            activeAgents: 2,
            totalTasks: 5,
            completedTasks: 3
          }
        },
        {
          id: 'character',
          name: '角色美术组',
          description: '负责游戏角色相关的美术工作',
          lead: '角色原画师',
          icon: '👤',
          color: '#2196F3',
          agents: ['角色原画师', '角色模型师', '角色绑定师', '角色动画师', '角色 TA'],
          state: {
            status: 'completed',
            progress: 100,
            activeAgents: 0,
            totalTasks: 5,
            completedTasks: 5
          }
        },
        {
          id: 'ui',
          name: 'UI 美术组',
          description: '负责游戏 UI 相关的美术工作',
          lead: 'UI 原画师',
          icon: '🎨',
          color: '#FF9800',
          agents: ['UI 原画师', 'UI 制作师', 'UI/UX 设计师'],
          state: {
            status: 'completed',
            progress: 100,
            activeAgents: 0,
            totalTasks: 3,
            completedTasks: 3
          }
        }
      ]
    };

    // 模拟 Agent 实时状态
    const mockAgentStates = {
      '场景原画师': 'running',
      '场景模型师': 'running',
      '场景地编师': 'completed',
      '场景灯光师': 'completed',
      '场景 TA': 'completed',
      '角色原画师': 'completed',
      '角色模型师': 'completed',
      '角色绑定师': 'completed',
      '角色动画师': 'completed',
      '角色 TA': 'completed',
      'UI 原画师': 'completed',
      'UI 制作师': 'completed',
      'UI/UX 设计师': 'completed'
    };

    function renderDashboard(data) {
      const app = document.getElementById('app');
      
      // 协作警报
      let collaborationAlert = '';
      if (data.workingGroups > 1) {
        collaborationAlert = `
          <div class="collaboration-alert">
            <div class="collaboration-alert-icon">🤝</div>
            <div class="collaboration-alert-text">
              当前有 <strong>${data.workingGroups} 个组</strong> 同时在工作中，可能需要组间协作
            </div>
          </div>
        `;
      }

      // 统计卡片
      const statsBar = `
        <div class="stats-bar">
          <div class="stat-card stat-total">
            <div class="stat-value">${data.totalGroups}</div>
            <div class="stat-label">总分组</div>
          </div>
          <div class="stat-card stat-working">
            <div class="stat-value">${data.workingGroups}</div>
            <div class="stat-label">工作中</div>
          </div>
          <div class="stat-card stat-blocked">
            <div class="stat-value">${data.blockedGroups}</div>
            <div class="stat-label">阻塞</div>
          </div>
          <div class="stat-card stat-completed">
            <div class="stat-value">${data.completedGroups}</div>
            <div class="stat-label">已完成</div>
          </div>
        </div>
      `;

      // 分组卡片
      const groupsGrid = `
        <div class="groups-grid">
          ${data.groups.map(group => renderGroupCard(group)).join('')}
        </div>
      `;

      app.innerHTML = collaborationAlert + statsBar + groupsGrid;
      
      // 更新时间
      document.getElementById('last-update').textContent = 
        `最后更新：${new Date().toLocaleString('zh-CN')}`;
    }

    function renderGroupCard(group) {
      const statusLabels = {
        working: '工作中',
        blocked: '已阻塞',
        idle: '空闲',
        completed: '已完成'
      };

      return `
        <div class="group-card" style="border-left-color: ${group.color}">
          <div class="group-header">
            <div class="group-icon">${group.icon}</div>
            <div class="group-name">${group.name}</div>
            <div class="group-lead">组长：${group.lead}</div>
            <span class="status-badge status-${group.state.status}">${statusLabels[group.state.status]}</span>
          </div>
          
          ${group.description ? `<div class="group-description">${group.description}</div>` : ''}
          
          <div class="progress-section">
            <div class="progress-header">
              <span>进度</span>
              <span class="progress-value">${group.state.progress}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${group.state.progress}%; background: ${group.color}"></div>
            </div>
          </div>
          
          <div class="agents-section">
            <div class="agents-title">组成员 (${group.agents.length}人)</div>
            <div class="agents-list">
              ${group.agents.map(agent => {
                const isLead = agent === group.lead;
                const status = mockAgentStates[agent] || 'pending';
                return `
                  <div class="agent-badge ${isLead ? 'lead' : ''}">
                    <div class="agent-status ${status}"></div>
                    ${agent}${isLead ? ' 👑' : ''}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
          
          <div class="group-stats">
            <div class="stat-item">
              <div class="stat-item-value">${group.state.activeAgents}</div>
              <div class="stat-item-label">活跃 Agent</div>
            </div>
            <div class="stat-item">
              <div class="stat-item-value">${group.state.completedTasks}/${group.state.totalTasks}</div>
              <div class="stat-item-label">任务进度</div>
            </div>
            <div class="stat-item">
              <div class="stat-item-value">${group.agents.length}</div>
              <div class="stat-item-label">总人数</div>
            </div>
          </div>
        </div>
      `;
    }

    // 加载数据
    async function loadData() {
      try {
        // 实际使用时从 API 获取
        // const response = await fetch('/api/groups/summary');
        // const data = await response.json();
        
        // 使用模拟数据
        const data = mockData;
        renderDashboard(data);
        
        // 每 5 秒刷新一次
        setInterval(() => {
          // 模拟状态变化
          updateMockData();
          renderDashboard(mockData);
        }, 5000);
        
      } catch (error) {
        document.getElementById('app').innerHTML = `
          <div class="error">
            <strong>加载失败:</strong> ${error.message}
          </div>
        `;
      }
    }

    // 模拟数据更新
    function updateMockData() {
      // 随机改变某个 Agent 的状态
      const agents = Object.keys(mockAgentStates);
      const randomAgent = agents[Math.floor(Math.random() * agents.length)];
      const statuses = ['running', 'completed', 'pending'];
      mockAgentStates[randomAgent] = statuses[Math.floor(Math.random() * statuses.length)];
      
      // 重新计算组状态
      mockData.groups.forEach(group => {
        const groupAgents = group.agents;
        const activeAgents = groupAgents.filter(a => mockAgentStates[a] === 'running').length;
        const completedTasks = groupAgents.filter(a => mockAgentStates[a] === 'completed').length;
        
        group.state.activeAgents = activeAgents;
        group.state.completedTasks = completedTasks;
        group.state.progress = Math.round((completedTasks / groupAgents.length) * 100);
        
        if (completedTasks === groupAgents.length) {
          group.state.status = 'completed';
        } else if (activeAgents > 0) {
          group.state.status = 'working';
        } else {
          group.state.status = 'idle';
        }
      });
      
      // 更新统计
      mockData.workingGroups = mockData.groups.filter(g => g.state.status === 'working').length;
      mockData.completedGroups = mockData.groups.filter(g => g.state.status === 'completed').length;
    }

    // 初始化
    loadData();
  </script>
</body>
</html>

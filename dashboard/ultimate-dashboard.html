<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestra 实时监控 Dashboard v3.0</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0,255,136,0.5);
        }
        .header-info {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,255,136,0.1);
            border-radius: 10px;
            border: 1px solid rgba(0,255,136,0.3);
        }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .stat { 
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 15px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .stat:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.3);
        }
        .stat-value { 
            font-size: 2.5em; 
            font-weight: bold; 
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0,255,136,0.5);
        }
        .stat-label { 
            opacity: 0.8; 
            margin-top: 10px; 
            font-size: 0.95em; 
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 400px;
        }
        .chart-full {
            grid-column: 1 / -1;
            min-height: 500px;
        }
        .chart-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #00ff88;
        }
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .agent-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #00ff88;
            transition: all 0.3s;
        }
        .agent-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,255,136,0.3);
        }
        .agent-card.running { 
            border-left-color: #1e90ff;
            animation: pulse 2s infinite;
        }
        .agent-card.completed { border-left-color: #00ff88; }
        .agent-card.failed { border-left-color: #ff4757; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(30,144,255,0.3); }
            50% { box-shadow: 0 0 15px rgba(30,144,255,0.6); }
        }
        .agent-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
        }
        .agent-name { 
            font-weight: bold; 
            font-size: 1em; 
        }
        .agent-status { 
            padding: 4px 12px; 
            border-radius: 12px; 
            font-size: 0.75em; 
            font-weight: bold; 
        }
        .agent-status.running { background: #1e90ff; }
        .agent-status.completed { background: #00ff88; color: #1a1a2e; }
        .agent-status.failed { background: #ff4757; }
        .agent-desc { 
            opacity: 0.8; 
            font-size: 0.85em; 
            margin: 8px 0; 
        }
        .agent-metrics { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-top: 10px; 
        }
        .metric { 
            background: rgba(0,0,0,0.2); 
            padding: 8px; 
            border-radius: 5px; 
            text-align: center; 
        }
        .metric-value { 
            font-size: 1.1em; 
            font-weight: bold; 
            color: #00ff88; 
        }
        .metric-label { 
            font-size: 0.7em; 
            opacity: 0.7; 
            margin-top: 3px; 
        }
        .progress-bar { 
            width: 100%; 
            height: 6px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 3px; 
            overflow: hidden; 
            margin-top: 10px; 
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #00ff88, #00b894); 
            transition: width 0.3s; 
        }
        .last-update { 
            text-align: center; 
            opacity: 0.6; 
            margin-top: 20px; 
            font-size: 0.9em; 
        }
        .refresh-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 10px;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎻 Orchestra 实时监控 Dashboard v3.0</h1>
        
        <div class="header-info">
            <span class="refresh-indicator"></span>
            实时数据 | 每 5 秒自动刷新 | 内嵌数据（无需服务器）
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalAgents">0</div>
                <div class="stat-label">总 Agent 数</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="runningAgents">0</div>
                <div class="stat-label">运行中</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="completedAgents">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="failedAgents">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalTokens">0</div>
                <div class="stat-label">总 Token</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="avgDuration">0m</div>
                <div class="stat-label">平均耗时</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-container">
                <h3 class="chart-title">📈 Token 消耗趋势</h3>
                <div id="tokenChart" style="width: 100%; height: 350px;"></div>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">🥧 Agent 状态分布</h3>
                <div id="statusChart" style="width: 100%; height: 350px;"></div>
            </div>
            <div class="chart-container chart-full">
                <h3 class="chart-title">📅 任务时间线</h3>
                <div id="timelineChart" style="width: 100%; height: 450px;"></div>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">📊 成本对比</h3>
                <div id="costChart" style="width: 100%; height: 350px;"></div>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">✅ 任务成功率</h3>
                <div id="successChart" style="width: 100%; height: 350px;"></div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="chart-title">📊 Agent 详情</h2>
            <div class="agent-grid" id="agentGrid"></div>
        </div>
        
        <div class="last-update">
            最后更新：<span id="lastUpdate">-</span>
        </div>
    </div>

    <script>
        // ==================== 从 API 读取真实数据 ====================
        const API_BASE = 'http://localhost:3000';
        
        let orchestraData = {
            stats: { total: 0, running: 0, completed: 0, failed: 0, totalTokens: 0, avgDuration: 0 },
            agents: [],
            tokenHistory: []
        };
        
        // 从 API 加载数据
        async function loadData() {
            try {
                const response = await fetch(`${API_BASE}/api/state`);
                if (!response.ok) {
                    throw new Error('API 响应失败');
                }
                const data = await response.json();
                
                orchestraData = data;
                
                // 初始化 token 历史（如果没有）
                if (!orchestraData.tokenHistory || orchestraData.tokenHistory.length === 0) {
                    orchestraData.tokenHistory = generateTokenHistory();
                }
                
                return true;
            } catch (err) {
                console.error('加载数据失败:', err);
                return false;
            }
        }
        
        // 生成模拟的 token 历史（用于演示）
        function generateTokenHistory() {
            const history = [];
            const now = new Date();
            for (let i = 30; i >= 0; i--) {
                const time = new Date(now.getTime() - i * 60000);
                history.push({
                    time: time.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                    tokens: Math.floor(i / 30 * orchestraData.stats.totalTokens)
                });
            }
            return history;
        }

        // ==================== 图表初始化 ====================
        let tokenChart, statusChart, timelineChart, costChart, successChart;

        function initCharts() {
            // Token 消耗趋势图
            tokenChart = echarts.init(document.getElementById('tokenChart'));
            tokenChart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: orchestraData.tokenHistory.map(d => d.time),
                    axisLine: { lineStyle: { color: '#00ff88' } }
                },
                yAxis: {
                    type: 'value',
                    name: 'Token',
                    axisLine: { lineStyle: { color: '#00ff88' } },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                series: [{
                    data: orchestraData.tokenHistory.map(d => d.tokens),
                    type: 'line',
                    smooth: true,
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(0,255,136,0.5)' },
                            { offset: 1, color: 'rgba(0,255,136,0)' }
                        ])
                    },
                    lineStyle: { color: '#00ff88', width: 3 },
                    itemStyle: { color: '#00ff88' }
                }]
            });

            // Agent 状态饼图
            statusChart = echarts.init(document.getElementById('statusChart'));
            statusChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { top: '5%', left: 'center', textStyle: { color: '#fff' } },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: [
                        { value: orchestraData.stats.running, name: '运行中', itemStyle: { color: '#1e90ff' } },
                        { value: orchestraData.stats.completed, name: '已完成', itemStyle: { color: '#00ff88' } },
                        { value: orchestraData.stats.failed, name: '失败', itemStyle: { color: '#ff4757' } }
                    ],
                    label: { color: '#fff' }
                }]
            });

            // 任务时间线甘特图
            timelineChart = echarts.init(document.getElementById('timelineChart'));
            const timelineData = orchestraData.agents.map(agent => {
                const start = new Date(agent.startTime);
                const end = new Date(agent.endTime || Date.now());
                const duration = ((end - start) / 60000).toFixed(1);
                return [agent.name, start, end, duration, agent.status];
            });
            
            timelineChart.setOption({
                tooltip: {
                    formatter: function (params) {
                        return `<strong>${params.data[0]}</strong><br/>
                                状态：${params.data[4]}<br/>
                                耗时：${params.data[2]} 分钟`;
                    }
                },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: {
                    type: 'time',
                    axisLine: { lineStyle: { color: '#00ff88' } },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                yAxis: {
                    type: 'category',
                    data: timelineData.map(d => d[0].substring(0, 30) + '...'),
                    axisLine: { lineStyle: { color: '#00ff88' } }
                },
                series: [{
                    type: 'custom',
                    renderItem: function (params, api) {
                        const start = api.coord([api.value(1), params.dataIndex]);
                        const end = api.coord([api.value(2), params.dataIndex]);
                        const height = api.size([0, 1])[1] * 0.6;
                        const color = api.value(4) === 'completed' ? '#00ff88' : 
                                     api.value(4) === 'running' ? '#1e90ff' : '#ff4757';
                        return {
                            type: 'rect',
                            shape: {
                                x: start[0],
                                y: start[1] - height / 2,
                                width: end[0] - start[0],
                                height: height
                            },
                            style: { fill: color }
                        };
                    },
                    data: timelineData
                }]
            });

            // 成本对比柱状图
            costChart = echarts.init(document.getElementById('costChart'));
            const costData = orchestraData.agents.slice(0, 10);
            costChart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: costData.map(a => a.name.substring(0, 15) + '...'),
                    axisLabel: { rotate: 45, color: '#fff' },
                    axisLine: { lineStyle: { color: '#00ff88' } }
                },
                yAxis: {
                    type: 'value',
                    name: 'Token',
                    axisLine: { lineStyle: { color: '#00ff88' } },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                series: [{
                    data: costData.map(a => a.tokens),
                    type: 'bar',
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#00ff88' },
                            { offset: 1, color: '#00b894' }
                        ])
                    }
                }]
            });

            // 任务成功率饼图
            successChart = echarts.init(document.getElementById('successChart'));
            successChart.setOption({
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: '70%',
                    data: [
                        { value: orchestraData.stats.completed, name: '成功', itemStyle: { color: '#00ff88' } },
                        { value: orchestraData.stats.failed, name: '失败', itemStyle: { color: '#ff4757' } }
                    ],
                    label: { 
                        formatter: '{b}: {d}%',
                        color: '#fff',
                        fontSize: 14
                    }
                }]
            });

            // 窗口大小变化时重新渲染
            window.addEventListener('resize', () => {
                tokenChart.resize();
                statusChart.resize();
                timelineChart.resize();
                costChart.resize();
                successChart.resize();
            });
        }

        // ==================== Agent 卡片渲染 ====================
        function renderAgentCards() {
            const grid = document.getElementById('agentGrid');
            grid.innerHTML = orchestraData.agents.map(agent => {
                // 兼容不同的数据结构
                const tokens = agent.tokens || agent.progress?.tokenCount || 0;
                const tools = agent.tools || agent.progress?.toolUseCount || 0;
                const duration = agent.endTime ? ((agent.endTime - agent.startTime) / 60000).toFixed(1) : 
                                ((Date.now() - agent.startTime) / 60000).toFixed(1);
                const progress = agent.status === 'completed' ? 100 : 
                                agent.status === 'running' ? 75 : 0;
                
                return `
                    <div class="agent-card ${agent.status}">
                        <div class="agent-header">
                            <span class="agent-name">${agent.name}</span>
                            <span class="agent-status ${agent.status}">${getStatusText(agent.status)}</span>
                        </div>
                        <div class="agent-desc">📝 ${agent.description}</div>
                        <div class="agent-metrics">
                            <div class="metric">
                                <div class="metric-value">${tokens.toLocaleString()}</div>
                                <div class="metric-label">Tokens</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${tools}</div>
                                <div class="metric-label">工具调用</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${duration}m</div>
                                <div class="metric-label">耗时</div>
                            </div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusText(status) {
            const map = {
                'completed': '✅ 完成',
                'running': '🔄 运行中',
                'failed': '❌ 失败',
                'pending': '⏳ 等待中'
            };
            return map[status] || status;
        }

        // ==================== 统计更新 ====================
        function updateStats() {
            document.getElementById('totalAgents').textContent = orchestraData.stats.total;
            document.getElementById('runningAgents').textContent = orchestraData.stats.running;
            document.getElementById('completedAgents').textContent = orchestraData.stats.completed;
            document.getElementById('failedAgents').textContent = orchestraData.stats.failed;
            document.getElementById('totalTokens').textContent = orchestraData.stats.totalTokens.toLocaleString();
            document.getElementById('avgDuration').textContent = (orchestraData.stats.avgDuration / 60000).toFixed(1) + 'm';
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
        }

        // ==================== 初始化 ====================
        async function init() {
            // 首次加载数据
            const loaded = await loadData();
            
            if (!loaded) {
                alert('无法连接到 API 服务器！\n\n请先运行：node orchestra-api-server.js');
                return;
            }
            
            initCharts();
            renderAgentCards();
            updateStats();
            
            // 每 5 秒自动刷新
            setInterval(async () => {
                await loadData();
                
                // 重新渲染图表
                tokenChart.setOption({
                    xAxis: { data: orchestraData.tokenHistory.map(d => d.time) },
                    series: [{ data: orchestraData.tokenHistory.map(d => d.tokens) }]
                });
                
                statusChart.setOption({
                    series: [{
                        data: [
                            { value: orchestraData.stats.running, name: '运行中', itemStyle: { color: '#1e90ff' } },
                            { value: orchestraData.stats.completed, name: '已完成', itemStyle: { color: '#00ff88' } },
                            { value: orchestraData.stats.failed, name: '失败', itemStyle: { color: '#ff4757' } }
                        ]
                    }]
                });
                
                renderAgentCards();
                updateStats();
            }, 5000);
        }

        // 启动
        init();
    </script>
</body>
</html>

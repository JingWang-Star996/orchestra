<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orchestra 实时监控 Dashboard v5.0</title>
    <!-- Phase 1: 移除整页刷新，改为智能轮询 -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 0;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        header {
            background: rgba(0,255,136,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #00ff88;
        }
        header h1 { font-size: 2em; text-align: center; text-shadow: 0 0 20px rgba(0,255,136,0.5); }
        header .status { text-align: center; margin-top: 10px; opacity: 0.8; }
        header .status .dot {
            display: inline-block; width: 10px; height: 10px; background: #00ff88;
            border-radius: 50%; margin-right: 10px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px); padding: 30px; border-radius: 15px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,255,136,0.3); }
        .stat-value { font-size: 3em; font-weight: bold; color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
        .stat-label { opacity: 0.8; margin-top: 10px; font-size: 1em; }
        .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .agent-card {
            background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px;
            border-left: 5px solid #00ff88; transition: all 0.3s; cursor: pointer;
        }
        .agent-card:hover { transform: translateX(10px); box-shadow: 0 5px 20px rgba(0,255,136,0.3); }
        .agent-card.running { border-left-color: #1e90ff; animation: pulse-border 2s infinite; }
        .agent-card.failed { border-left-color: #ff4757; }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 5px rgba(30,144,255,0.3); }
            50% { box-shadow: 0 0 15px rgba(30,144,255,0.6); }
        }
        .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .agent-name { font-size: 1.1em; font-weight: bold; }
        .agent-status { padding: 5px 15px; border-radius: 20px; font-size: 0.85em; font-weight: bold; }
        .agent-status.running { background: #1e90ff; }
        .agent-status.completed { background: #00ff88; color: #0f0f1a; }
        .agent-status.failed { background: #ff4757; }
        .agent-desc { opacity: 0.8; margin-bottom: 15px; font-size: 0.95em; }
        .agent-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .metric { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.3s; user-select: none; }
        .metric:hover { background: rgba(0,255,136,0.2); transform: scale(1.05); }
        .metric:active { transform: scale(0.95); }
        .metric-value { font-size: 1.3em; font-weight: bold; color: #00ff88; }
        .metric-label { font-size: 0.75em; opacity: 0.7; margin-top: 5px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 15px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00b894); transition: width 0.3s; }
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-container { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); height: 400px; position: relative; overflow: hidden; }
        .chart-title { font-size: 1.2em; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #00ff88; }
        .chart-wrapper { position: relative; height: 320px; width: 100%; }
        .chart { width: 100% !important; height: 100% !important; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
        .modal.show { display: flex; }
        .modal-content { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; padding: 30px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto; border: 2px solid #00ff88; box-shadow: 0 0 50px rgba(0,255,136,0.5); cursor: default; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #00ff88; }
        .modal-title { font-size: 1.5em; font-weight: bold; }
        .modal-close { background: transparent; border: none; color: #fff; font-size: 2em; cursor: pointer; opacity: 0.7; transition: opacity 0.3s; }
        .modal-close:hover { opacity: 1; }
        .tool-list { list-style: none; padding: 0; }
        .tool-item { background: rgba(255,255,255,0.05); padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 4px solid #00ff88; }
        .tool-name { font-weight: bold; color: #00ff88; margin-bottom: 5px; }
        .tool-desc { opacity: 0.8; font-size: 0.95em; }
        .tool-time { opacity: 0.6; font-size: 0.85em; margin-top: 5px; }
        footer { text-align: center; opacity: 0.6; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .charts { grid-template-columns: 1fr; }
            .agent-grid { grid-template-columns: 1fr; }
            .modal-content { width: 95%; padding: 20px; }
        }
        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
            .stat-card { padding: 15px; }
            .stat-value { font-size: 2em; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎻 Orchestra 实时监控 Dashboard v5.0</h1>
        <div class="status">
            <span class="dot"></span>
            实时数据 | 智能轮询 | 弹窗保持 | 🔄 <button onclick="forceRefresh()" style="background:transparent;border:1px solid #00ff88;color:#00ff88;padding:4px 12px;border-radius:4px;cursor:pointer;margin-left:10px;">立即刷新</button>
        </div>
    </header>
    <div class="container">
        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="totalAgents">0</div><div class="stat-label">总 Agent 数</div></div>
            <div class="stat-card"><div class="stat-value" id="runningAgents">0</div><div class="stat-label">运行中</div></div>
            <div class="stat-card"><div class="stat-value" id="completedAgents">0</div><div class="stat-label">已完成</div></div>
            <div class="stat-card"><div class="stat-value" id="failedAgents">0</div><div class="stat-label">失败</div></div>
            <div class="stat-card"><div class="stat-value" id="totalTokens">0</div><div class="stat-label">总 Token</div></div>
            <div class="stat-card"><div class="stat-value" id="avgDuration">0m</div><div class="stat-label">平均耗时</div></div>
        </div>
        <div class="charts">
            <div class="chart-container">
                <h3 class="chart-title">📈 Token 消耗趋势</h3>
                <div class="chart-wrapper"><canvas id="tokenChart" class="chart"></canvas></div>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">🥧 Agent 状态分布</h3>
                <div class="chart-wrapper"><canvas id="statusChart" class="chart"></canvas></div>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">📊 成本对比</h3>
                <div class="chart-wrapper"><canvas id="costChart" class="chart"></canvas></div>
            </div>
            <div class="chart-container">
                <h3 class="chart-title">✅ 任务成功率</h3>
                <div class="chart-wrapper"><canvas id="successChart" class="chart"></canvas></div>
            </div>
        </div>
        <h2 class="chart-title">📊 Agent 详情</h2>
        <div class="agent-grid" id="agentGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5;">正在加载 Agent 数据...</div>
        </div>
        <div id="toolModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title" id="modalTitle">🔧 工具调用详情</h3>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div id="modalBody">
                    <ul class="tool-list" id="toolList"></ul>
                </div>
            </div>
        </div>
    </div>
    <footer>
        <p>Orchestra Dashboard v5.0 (Phase 1) | 最后更新：<span id="lastUpdate">-</span> | 🟢 智能轮询中</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:3000';
        const REFRESH_INTERVAL = 10000; // 10 秒轮询
        let dashboardData = { stats: {}, agents: [], tokenHistory: [] };
        let charts = {};
        let modalState = { isOpen: false, agentId: null };
        let errorCount = 0;
        let lastDataHash = '';
        let mainInterval = null;
        let lastChartUpdate = 0;

        // Phase 1: sessionStorage 弹窗持久化
        function saveModalState() {
            if (modalState.isOpen && modalState.agentId) {
                sessionStorage.setItem('dashboard_modal', JSON.stringify(modalState));
            }
        }

        function restoreModalState() {
            try {
                const saved = sessionStorage.getItem('dashboard_modal');
                if (saved) {
                    modalState = JSON.parse(saved);
                    if (modalState.isOpen && modalState.agentId) {
                        const agent = dashboardData.agents.find(a => a.id === modalState.agentId);
                        if (agent) {
                            showToolDetails(modalState.agentId, agent.name, 0);
                        }
                    }
                }
            } catch (e) {
                console.error('[Dashboard] 恢复弹窗状态失败:', e);
            }
        }

        // 强制刷新功能
        function forceRefresh() {
            console.log('[Dashboard] 手动强制刷新');
            lastDataHash = ''; // 清空缓存，强制全量更新
            main();
        }

        async function loadData() {
            try {
                const response = await fetch(`${API_BASE}/api/state`, { signal: AbortSignal.timeout(5000) });
                if (!response.ok) throw new Error('API 响应失败');
                const data = await response.json();
                dashboardData = data;
                errorCount = 0;
                return true;
            } catch (err) {
                errorCount++;
                console.error(`[Dashboard] 加载失败 (${errorCount}/3):`, err);
                if (errorCount >= 3) {
                    document.getElementById('agentGrid').innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #ff4757;">
                            ⚠️ 连续 3 次加载失败，请检查 API 服务器
                            <br><br>
                            <button onclick="location.reload()" style="padding: 10px 20px; background: #00ff88; border: none; border-radius: 5px; cursor: pointer;">🔄 重新加载</button>
                        </div>`;
                }
                return false;
            }
        }

        // Phase 1: 智能更新 - 只更新变化的部分
        function shouldUpdate() {
            const hash = JSON.stringify({
                stats: dashboardData.stats,
                agents: dashboardData.agents.map(a => ({ id: a.id, status: a.status, tokens: a.progress?.tokenCount, tools: a.progress?.toolUseCount }))
            });
            return hash !== lastDataHash;
        }

        function updateStats() {
            const s = dashboardData.stats || {};
            document.getElementById('totalAgents').textContent = s.total || 0;
            document.getElementById('runningAgents').textContent = s.running || 0;
            document.getElementById('completedAgents').textContent = s.completed || 0;
            document.getElementById('failedAgents').textContent = s.failed || 0;
            document.getElementById('totalTokens').textContent = (s.totalTokens || 0).toLocaleString();
            document.getElementById('avgDuration').textContent = ((s.avgDuration || 0) / 60000).toFixed(1) + 'm';
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
        }

        function renderAgents() {
            const grid = document.getElementById('agentGrid');
            const agents = dashboardData.agents || [];
            if (agents.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5;">暂无 Agent 数据</div>';
                return;
            }
            grid.innerHTML = agents.map(agent => {
                const tokens = agent.tokens || agent.progress?.tokenCount || 0;
                const tools = agent.tools || agent.progress?.toolUseCount || 0;
                const duration = agent.endTime ? ((agent.endTime - agent.startTime) / 60000).toFixed(1) : ((Date.now() - agent.startTime) / 60000).toFixed(1);
                const progress = agent.status === 'completed' ? 100 : agent.status === 'running' ? 75 : 0;
                return `
                    <div class="agent-card ${agent.status}" data-id="${agent.id}">
                        <div class="agent-header">
                            <span class="agent-name">${agent.name}</span>
                            <span class="agent-status ${agent.status}">${getStatusText(agent.status)}</span>
                        </div>
                        <div class="agent-desc">📝 ${agent.description || '-'}</div>
                        <div class="agent-metrics">
                            <div class="metric"><div class="metric-value">${tokens.toLocaleString()}</div><div class="metric-label">Tokens</div></div>
                            <div class="metric" onclick="showToolDetails('${agent.id}', '${agent.name}', ${tools})"><div class="metric-value">${tools}</div><div class="metric-label">🔧 工具调用<br><small>点击查看详情</small></div></div>
                            <div class="metric"><div class="metric-value">${duration}m</div><div class="metric-label">耗时</div></div>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    </div>`;
            }).join('');
        }

        // 差异化更新 Agent 卡片
        function updateAgentCardsOnly() {
            dashboardData.agents.forEach(agent => {
                const card = document.querySelector(`.agent-card[data-id="${agent.id}"]`);
                if (!card) return;
                const tokens = agent.tokens || agent.progress?.tokenCount || 0;
                const tools = agent.tools || agent.progress?.toolUseCount || 0;
                const duration = agent.endTime ? ((agent.endTime - agent.startTime) / 60000).toFixed(1) : ((Date.now() - agent.startTime) / 60000).toFixed(1);
                const progress = agent.status === 'completed' ? 100 : agent.status === 'running' ? 75 : 0;
                
                // 只更新变化的部分
                const oldStatus = card.querySelector('.agent-status').textContent;
                const newStatus = getStatusText(agent.status);
                if (oldStatus !== newStatus) {
                    card.querySelector('.agent-status').textContent = newStatus;
                    card.className = `agent-card ${agent.status}`;
                    // 状态变化时高亮闪烁
                    card.style.animation = 'pulse-border 0.5s 2';
                }
                
                card.querySelectorAll('.metric-value')[0].textContent = tokens.toLocaleString();
                card.querySelectorAll('.metric-value')[1].textContent = tools;
                card.querySelectorAll('.metric-value')[2].textContent = duration + 'm';
                card.querySelector('.progress-fill').style.width = progress + '%';
            });
        }

        function getStatusText(status) {
            const map = { completed: '✅ 完成', running: '🔄 运行中', failed: '❌ 失败', pending: '⏳ 等待中' };
            return map[status] || status;
        }

        // 从 API 数据中获取真实工具调用记录
        function getToolDetails(agent) {
            if (agent.toolCalls && Array.isArray(agent.toolCalls) && agent.toolCalls.length > 0) {
                return agent.toolCalls.map(tool => ({
                    name: tool.name || 'unknown',
                    desc: tool.description || getToolDescription(tool.name),
                    icon: getToolIcon(tool.name),
                    time: tool.timestamp ? new Date(tool.timestamp).toLocaleTimeString() : new Date(agent.startTime).toLocaleTimeString(),
                    args: tool.args || {}
                }));
            }
            if (agent.progress && Array.isArray(agent.progress.toolUse)) {
                return agent.progress.toolUse.map(tool => ({
                    name: tool.name || 'unknown',
                    desc: getToolDescription(tool.name),
                    icon: getToolIcon(tool.name),
                    time: tool.timestamp ? new Date(tool.timestamp).toLocaleTimeString() : new Date(agent.startTime).toLocaleTimeString()
                }));
            }
            const count = agent.progress?.toolUseCount || 0;
            if (count > 0) {
                return [{
                    name: 'info',
                    desc: `该 Agent 共调用了 ${count} 次工具，但详细记录未保存。`,
                    icon: 'ℹ️',
                    time: '-',
                    args: {}
                }];
            }
            return [];
        }

        function getToolIcon(toolName) {
            const icons = {
                read: '📄', write: '✏️', edit: '🔧', exec: '⚡',
                web_search: '🌐', web_fetch: '📥', browser: '🌏',
                message: '💬', sessions_spawn: '🤖', sessions_send: '📨',
                image: '🖼️', image_generate: '🎨', tts: '🔊',
                feishu_sheet: '📊', feishu_doc: '📝', feishu_calendar: '📅',
                feishu_task: '✅', feishu_bitable: '🗂️', feishu_im: '💬'
            };
            return icons[toolName] || '🔧';
        }

        function getToolDescription(toolName) {
            const descs = {
                read: '读取文件', write: '写入文件', edit: '编辑文件', exec: '执行命令',
                web_search: '网络搜索', web_fetch: '获取网页', browser: '浏览器控制',
                message: '发送消息', sessions_spawn: '启动子代理', sessions_send: '发送消息到会话',
                image: '分析图片', image_generate: '生成图片', tts: '语音合成',
                feishu_sheet: '飞书表格', feishu_doc: '飞书文档', feishu_calendar: '飞书日历',
                feishu_task: '飞书任务', feishu_bitable: '飞书多维表格', feishu_im: '飞书消息'
            };
            return descs[toolName] || '工具调用';
        }

        function showToolDetails(agentId, agentName, count) {
            const agent = dashboardData.agents.find(a => a.id === agentId);
            if (!agent) {
                console.error('Agent 不存在:', agentId);
                return;
            }
            const tools = getToolDetails(agent);
            const modal = document.getElementById('toolModal');
            const title = document.getElementById('modalTitle');
            const list = document.getElementById('toolList');
            title.textContent = `🔧 ${agentName} - 工具调用详情 (${tools.length}次)`;
            list.innerHTML = tools.length === 0 ? '<li class="tool-item">暂无工具调用记录</li>' : tools.map(tool => `
                <li class="tool-item">
                    <div class="tool-name">${tool.icon} ${tool.name}</div>
                    <div class="tool-desc">${tool.desc}</div>
                    <div class="tool-time">⏰ ${tool.time}</div>
                    ${Object.keys(tool.args).length > 0 ? `<div style="margin-top:8px;font-size:0.85em;opacity:0.6;">📋 参数：${JSON.stringify(tool.args).substring(0, 200)}${JSON.stringify(tool.args).length > 200 ? '...' : ''}</div>` : ''}
                </li>`).join('');
            modal.dataset.agentId = agentId;
            modalState.isOpen = true;
            modalState.agentId = agentId;
            modal.classList.add('show');
            
            // Phase 1: 保存到 sessionStorage
            saveModalState();
            
            console.log('弹窗已打开:', agentName, '- 工具数:', tools.length);
        }

        function closeModal() {
            modalState.isOpen = false;
            modalState.agentId = null;
            document.getElementById('toolModal').classList.remove('show');
            sessionStorage.removeItem('dashboard_modal');
            console.log('弹窗已关闭');
        }

        function initCharts() {
            Chart.defaults.color = '#fff';
            Chart.defaults.borderColor = 'rgba(255,255,255,0.1)';
            charts.token = new Chart(document.getElementById('tokenChart'), {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'Token 消耗', data: [], borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, animation: false }
            });
            charts.status = new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: { labels: ['运行中', '已完成', '失败'], datasets: [{ data: [0, 0, 0], backgroundColor: ['#1e90ff', '#00ff88', '#ff4757'] }] },
                options: { responsive: true, maintainAspectRatio: false, animation: false }
            });
            charts.cost = new Chart(document.getElementById('costChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Token 消耗', data: [], backgroundColor: 'rgba(0,255,136,0.7)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, animation: false }
            });
            charts.success = new Chart(document.getElementById('successChart'), {
                type: 'pie',
                data: { labels: ['成功', '失败'], datasets: [{ data: [0, 0], backgroundColor: ['#00ff88', '#ff4757'] }] },
                options: { responsive: true, maintainAspectRatio: false, animation: false }
            });
        }

        function updateCharts() {
            const agents = dashboardData.agents || [];
            const s = dashboardData.stats || {};
            
            // Phase 1: 图表节流更新（每 30 秒）
            const now = Date.now();
            if (now - lastChartUpdate < 30000) return;
            lastChartUpdate = now;
            
            charts.token.data.labels = (dashboardData.tokenHistory || []).map(d => d.time);
            charts.token.data.datasets[0].data = (dashboardData.tokenHistory || []).map(d => d.tokens);
            charts.token.update('none');
            charts.status.data.datasets[0].data = [s.running || 0, s.completed || 0, s.failed || 0];
            charts.status.update('none');
            charts.cost.data.labels = agents.slice(0, 10).map(a => a.name.substring(0, 15) + '...');
            charts.cost.data.datasets[0].data = agents.slice(0, 10).map(a => a.tokens || a.progress?.tokenCount || 0);
            charts.cost.update('none');
            charts.success.data.datasets[0].data = [s.completed || 0, s.failed || 0];
            charts.success.update('none');
        }

        async function main() {
            const loaded = await loadData();
            if (!loaded) return;
            
            // Phase 1: 首次加载时恢复弹窗状态
            if (lastDataHash === '') {
                restoreModalState();
            }
            
            // 弹窗打开时，只更新数据，不重新渲染 DOM
            if (modalState.isOpen) {
                updateStats();
                updateAgentCardsOnly();
                updateCharts();
                return;
            }
            
            // 数据未变化，跳过更新
            if (!shouldUpdate()) return;
            
            updateStats();
            renderAgents();
            updateCharts();
        }

        // 初始化图表
        initCharts();
        // 首次加载
        main();
        // Phase 1: 智能轮询（取代整页刷新）
        mainInterval = setInterval(main, REFRESH_INTERVAL);

        window.addEventListener('beforeunload', () => {
            if (mainInterval) clearInterval(mainInterval);
            Object.values(charts).forEach(chart => { if (chart && typeof chart.destroy === 'function') chart.destroy(); });
        });

        document.getElementById('toolModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
